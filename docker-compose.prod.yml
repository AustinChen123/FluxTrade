services:
  redis:
    image: redis:alpine
    container_name: fluxtrade-redis
    restart: always
    ports:
      - "6379:6379"
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --save 60 1 --loglevel warning --requirepass $$REDIS_PASSWORD;
      else
        redis-server --save 60 1 --loglevel warning;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: fluxtrade-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fluxtrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluxtrade}
      POSTGRES_DB: ${POSTGRES_DB:-fluxtrade}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rust-data:
    build:
      context: ./rust-data-service
      dockerfile: Dockerfile
    container_name: fluxtrade-rust
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-fluxtrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluxtrade}
      POSTGRES_DB: ${POSTGRES_DB:-fluxtrade}
      EXCHANGE_ENABLED: "binance,backpack"
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
      EXCHANGE_SECRET: ${EXCHANGE_SECRET}
    command: ["live", "--exchange", "binance", "--symbol", "BTCUSDT"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  python-strategy:
    build:
      context: ./python-strategy
      dockerfile: Dockerfile
    container_name: fluxtrade-python
    restart: unless-stopped
    depends_on:
      - redis
      - db
      - rust-data
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-fluxtrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluxtrade}
      POSTGRES_DB: ${POSTGRES_DB:-fluxtrade}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET: ${BINANCE_SECRET}
    volumes:
      - ./python-strategy/strategies_hot:/app/strategies_hot
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: fluxtrade-dashboard
    restart: always
    depends_on:
      - redis
      - db
    ports:
      - "8501:8501"
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-fluxtrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluxtrade}
      POSTGRES_DB: ${POSTGRES_DB:-fluxtrade}
    command: >
      streamlit run app.py
      --server.enableCORS=false
      --server.enableXsrfProtection=true
      --server.address=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
