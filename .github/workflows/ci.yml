name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust-data-service
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-data-service/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-data-service/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests (pure Rust, no PyO3 extension)
        run: cargo test --no-default-features

  python-check:
    name: Python Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python-strategy
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run unit tests with coverage
        run: uv run pytest -m "not integration and not rust" --cov=src --cov-report=term-missing --cov-fail-under=75

  integration-check:
    name: Integration Tests (Rust + Python)
    runs-on: ubuntu-latest
    needs: [rust-check, python-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-data-service/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-data-service/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Rust library
        working-directory: ./rust-data-service
        run: RUSTFLAGS="-C link-arg=-undefined -C link-arg=dynamic_lookup" cargo build --lib --release
        if: runner.os == 'macOS'

      - name: Build Rust library (Linux)
        working-directory: ./rust-data-service
        run: cargo build --lib --release
        if: runner.os == 'Linux'

      - name: Copy .so to Python
        run: |
          if [ -f rust-data-service/target/release/libfluxtrade_core.dylib ]; then
            cp rust-data-service/target/release/libfluxtrade_core.dylib python-strategy/src/fluxtrade_core.so
          elif [ -f rust-data-service/target/release/libfluxtrade_core.so ]; then
            cp rust-data-service/target/release/libfluxtrade_core.so python-strategy/src/fluxtrade_core.so
          else
            echo "::warning::Rust library not found, skipping integration tests"
            exit 0
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        working-directory: ./python-strategy
        run: uv python install

      - name: Run integration tests
        working-directory: ./python-strategy
        run: uv run pytest -m "integration or rust" -v
