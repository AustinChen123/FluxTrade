site_name: FluxTrade Documentation
site_description: High-performance crypto trading system — Live = Backtest

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: 繁體中文
      link: /zh-TW/
      lang: zh-TW

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - First Backtest: getting-started/first-backtest.md
  - Guide:
    - Writing Strategies: guide/writing-strategies.md
    - Backtesting: guide/backtesting.md
    - External Signals: guide/external-signals.md
    - Live Trading: guide/live-trading.md
    - Configuration: guide/configuration.md
  - Architecture:
    - Overview: architecture/overview.md
    - Data Flow: architecture/data-flow.md
    - Adapter Pattern: architecture/adapter-pattern.md
    - Rust Engine: architecture/rust-engine.md
  - API Reference:
    - Models: api/models.md
    - Interfaces: api/interfaces.md
    - Rust Bindings: api/rust-bindings.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python-strategy/src]

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
